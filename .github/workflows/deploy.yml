name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # Остановить и удалить старый контейнер (если есть)
            docker stop fastapi || true
            docker rm fastapi || true

            # Удалить старый образ (опционально)
            docker rmi ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true

            # Логин в ghcr.io (токен передаётся через SSH)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Скачать новый образ
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Запустить новый контейнер с переменными из GitHub Secrets
            docker run -d \
              --name fastapi \
              --restart unless-stopped \
              -p 8000:8000 \
              -e ENVIRONMENT=${{ secrets.ENVIRONMENT }} \
              -e DEBUG=${{ secrets.DEBUG }} \
              -e PORT=8000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Показать работающие контейнеры
            docker ps | grep fastapi

            # Очистить неиспользуемые образы
            docker image prune -f